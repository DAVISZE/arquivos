<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Painel</title>

<style>

body{
background:#0f0f0f;
color:#00ff9c;
font-family:monospace;
text-align:center;
margin-top:60px;
}

input,button{
background:#111;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px;
margin:5px;
}

button:hover{
background:#00ff9c;
color:black;
cursor:pointer;
}

#painel{display:none}

.abas button{
width:120px;
}

.aba{
display:none;
margin-top:30px;
}

ul{
list-style:none;
padding:0;
}

li{
padding:6px;
border-bottom:1px solid #333;
}

</style>

</head>
<body>

<div id="login">

<h2>ACESSO</h2>

<input type="password" id="senha" placeholder="senha">
<br><br>
<button onclick="entrar()">ENTRAR</button>

<p id="erro"></p>

</div>


<div id="painel">

<h2>PAINEL</h2>

<div class="abas">
<button onclick="abrir('upload')">UPLOAD</button>
<button onclick="abrir('arquivos')">ARQUIVOS</button>
</div>


<div id="upload" class="aba">

<h3>Enviar arquivo</h3>

<input type="file" id="arquivo">
<br><br>
<button onclick="enviar()">ENVIAR</button>

<p id="status"></p>

</div>


<div id="arquivos" class="aba">

<h3>Arquivos</h3>

<button onclick="listar()">ATUALIZAR</button>

<ul id="lista"></ul>

</div>

</div>

<script>

const SENHA="101205"

const URL_SCRIPT="https://script.google.com/macros/s/AKfycbwNneUe2CSe5Mn2ZE8vLdkCmG-gdR4Xeo461IhFl2TNC-obGG74CRa7dqElAjpWXamJ/exec"


function entrar(){

const s=document.getElementById("senha").value

if(s===SENHA){

document.getElementById("login").style.display="none"
document.getElementById("painel").style.display="block"

abrir("upload")

}else{

document.getElementById("erro").innerText="senha incorreta"

}

}



function abrir(nome){

document.querySelectorAll(".aba").forEach(a=>a.style.display="none")

document.getElementById(nome).style.display="block"

}



function enviar(){

const file=document.getElementById("arquivo").files[0]

if(!file){
alert("escolha um arquivo")
return
}

const reader=new FileReader()

reader.onload=function(){

const base64=reader.result.split(",")[1]

fetch(URL_SCRIPT,{
method:"POST",
body:new URLSearchParams({
senha:SENHA,
nome:file.name,
tipo:file.type,
file:base64
})
})
.then(r=>r.text())
.then(t=>{
document.getElementById("status").innerText=t
})

}

reader.readAsDataURL(file)

}



function listar(){

fetch(URL_SCRIPT+"?listar=1")
.then(r=>r.json())
.then(lista=>{

const ul=document.getElementById("lista")
ul.innerHTML=""

lista.forEach(nome=>{

const li=document.createElement("li")
li.textContent=nome
ul.appendChild(li)

})

})

}

</script>

</body>
</html>
