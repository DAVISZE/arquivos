<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upload</title>
</head>
<body>

<h2>Enviar arquivo</h2>

<input type="password" id="senha" placeholder="Senha"><br><br>
<input type="file" id="arquivo"><br><br>

<button onclick="enviar()">Enviar</button>

<p id="status"></p>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxlhBFuTtRJlsCAbr1MTlkhRaKkp_saLpJtBdkPbDx5gFjNUA16ABI1ncxfGpWSNPvW/exec"

function enviar(){

    const senha = document.getElementById("senha").value
    const file = document.getElementById("arquivo").files[0]

    if(!file){
        alert("Escolha um arquivo")
        return
    }

    const reader = new FileReader()

    reader.onload = function(){

        const base64 = reader.result.split(",")[1]

        fetch(URL_SCRIPT,{
            method:"POST",
            body:new URLSearchParams({
                senha:senha,
                nome:file.name,
                tipo:file.type,
                file:base64
            })
        })
        .then(r=>r.text())
        .then(t=>{
            document.getElementById("status").innerText = t
        })

    }

    reader.readAsDataURL(file)

}

</script>

</body>
</html>
